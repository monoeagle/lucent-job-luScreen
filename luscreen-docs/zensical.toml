[project]
site_name        = "LucentScreen"
site_description = "Windows-Screenshot-Tool mit Tray, Hotkeys und Editor · PowerShell + WPF · v0.1.0"
site_author      = "LucentScreen"
copyright        = "Copyright &copy; 2026"

docs_dir = "docs"
site_dir = "site"

# Wichtig fuer file://-Aufrufe nach './run.ps1 d': baut <name>.html-Seiten
# statt <name>/index.html-Verzeichnis-URLs. Sonst zeigt der Browser beim
# Doppelklick eine Ordner-Liste statt der Seite. Beim Live-Server (D) waere
# directory_urls schoener, aber wir wollen ein einziges Build-Resultat.
use_directory_urls = false

extra_css        = ["stylesheets/extra.css"]
extra_javascript = []

nav = [
  { "Überblick" = "index.md" },
  { "Grundlagen" = [
    { "Installation"   = "grundlagen/installation.md" },
    { "Schnellstart"   = "grundlagen/schnellstart.md" },
    { "Plattformen"    = "grundlagen/plattformen.md" },
  ]},
  { "Anleitungen" = [
    { "Tray-Icon"        = "anleitung/tray.md" },
    { "Hotkeys"          = "anleitung/hotkeys.md" },
    { "Bereich-Capture"  = "anleitung/bereich-capture.md" },
    { "Editor"           = "anleitung/editor.md" },
    { "Verlauf"          = "anleitung/verlauf.md" },
  ]},
  { "Referenz" = [
    { "Architektur"     = "referenz/architektur.md" },
    { "Konfiguration"   = "referenz/konfiguration.md" },
    { "Hotkey-System"   = "referenz/hotkey-system.md" },
    { "Capture-Modi"    = "referenz/capture-modi.md" },
  ]},
  { "Entwicklung" = [
    { "Projektstruktur" = "entwicklung/projektstruktur.md" },
    { "Testing"         = "entwicklung/testing.md" },
    { "Stolpersteine"   = "entwicklung/stolpersteine.md" },
    { "Erledigt"        = "entwicklung/erledigt.md" },
    { "Changelog"       = "entwicklung/changelog.md" },
  ]},
]

[project.theme]
language = "de"
